global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8080"]
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
